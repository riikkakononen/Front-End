<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>

  <body>

    <h3>REGISTER</h3>

    <form class="registerForm">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        name="username"
        placeholder="daisy"
      />
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="duck"
      />
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        placeholder="daisy@example.com"
      />
      <input
        name="submit"
        type="submit"
        value="Add User"
        class="postuser"
      />
    </form>
  </body>

  <script type="module" src="/src/js/register.js"></script>
</html>
