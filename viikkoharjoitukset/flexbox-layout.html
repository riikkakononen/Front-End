<!doctype html>
<html>
  <head>
    <title>Positioning Items</title>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande',
          'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      }

      .wrapper {
        background-color: azure;
        border: 1px solid black;
        max-width: 800px;
        width: 100%;
      }
      #footer {
        background-color: rgb(223, 223, 223);
        color: black;
        width: 100%;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      main {
        display: flex;
        height: 300px;
        gap: 20px;
      }
      #left {
        background-color: rgb(174, 156, 176);
        flex: 2;
        padding: 5px;
      }
      #right {
        flex: 6;
        display: flex;
        flex-direction: column;
      }
      #top {
        background-color: aqua;
        flex: 1;
      }
      #bottom {
        flex: 2;
      }

      #heading {
        background-color: rgba(0, 179, 255, 0.309);
        height: 100px;
        width: 100%;
        border: 1px solid black;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #heading ul {
        display: flex;
        list-style-type: none;
        justify-content: flex-start;
      }
      #heading li {
        width: 70px;
        background-color: bisque;
        padding: 5px;
        margin: 10px;
        text-align: center;
      }
      button {
        height: 40px;
        background-color: blueviolet;
        color: aliceblue;
        margin-right: 30px;
      }
      @media screen and (max-width: 500px) {
        main {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div id="heading">
        <ul>
          <li>Home</li>
          <li>Cats</li>
          <li>Dogs</li>
        </ul>
        <button>LOGIN</button>
      </div>
      <main>
        <div id="left">Recent posts</div>
        <!-- flexbox container -->
        <div id="right">
          <div id="top">IMAGE</div>
          <div id="bottom">
            <h2>Otsikko</h2>
            <p>Normaalisti sisältöä</p>
          </div>
        </div>
      </main>
      <div id="footer">
        <p>Copyright by Ulla</p>
      </div>
    </div>
  </body>
</html>
